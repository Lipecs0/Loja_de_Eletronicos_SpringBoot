<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Produtos Eletrônicos</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:0;padding:16px;background:#f5f7fa}
    .container{max-width:1000px;margin:auto}
    .card{background:#fff;padding:12px;border-radius:8px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}
    input,textarea{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px}
    button{background:#2563eb;color:#fff;border:0;padding:8px 12px;border-radius:6px;cursor:pointer}
    button.ghost{background:#6b7280}
    .actions{display:flex;gap:8px}
    img.thumb {width: 64px; height: 64px; object-fit: contain; border-radius: 4px; background: #f1f5f9;padding: 2px;}
    .hidden{display:none}
    form.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .produto-card img {
    width: 180px;              
    height: 140px;             
    object-fit: contain;       
    display: block;
    margin: 0 auto 8px;
    background: #f8fafc;      
    border-radius: 6px;
    padding: 4px;
}

  </style>
</head>

<body>
<div class="container">

  <header style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h1 style="margin:0;font-size:22px">Painel de Produtos</h1>
    <button onclick="showForm()">Novo Produto</button>
  </header>

  <section id="formSection" class="card hidden">
    <h3 id="formTitle">Cadastrar produto</h3>
    <form id="produtoForm" class="grid">
      <input type="hidden" id="produtoId" />

      <div>
        <label>Nome</label>
        <input id="nome" required />
      </div>

      <div>
        <label>Categoria</label>
        <input id="categoria" />
      </div>

      <div style="grid-column:1/3">
        <label>Descrição</label>
        <textarea id="descricao" rows="3"></textarea>
      </div>

      <div>
        <label>Preço</label>
        <input id="preco" type="number" step="0.01" required />
      </div>

      <div>
        <label>Estoque</label>
        <input id="estoque" type="number" required />
      </div>

      <div style="grid-column:1/3">
        <label>URL da Imagem</label>
        <input id="imagemUrl" />
      </div>

      <div style="grid-column:1/3;display:flex;justify-content:flex-end;gap:8px">
        <button type="submit">Salvar</button>
        <button type="button" class="ghost" onclick="hideForm()">Cancelar</button>
      </div>
    </form>
  </section>

  <section class="card">
    <h3>Produtos cadastrados</h3>
    <table>
      <thead>
        <tr><th>Imagem</th><th>Nome</th><th>Categoria</th><th>Preço</th><th>Estoque</th><th>Ações</th></tr>
      </thead>
      <tbody id="produtosTbody"></tbody>
    </table>
  </section>

</div>

<script>
const API_BASE = "/api/produtos";
const el = id => document.getElementById(id);
let editando = false;

function showForm(produto) {
  el("formSection").parentElement.classList.remove("hidden");
  el("formSection").classList.remove("hidden");

  if (produto) {
    editando = true;
    el("formTitle").textContent = "Editar produto";
    el("produtoId").value = produto.id;
    el("nome").value = produto.nome;
    el("categoria").value = produto.categoria;
    el("descricao").value = produto.descricao;
    el("preco").value = produto.preco;
    el("estoque").value = produto.estoque;
    el("imagemUrl").value = produto.imagemUrl;
  } else {
    editando = false;
    el("formTitle").textContent = "Cadastrar produto";
    el("produtoForm").reset();
    el("produtoId").value = "";
  }
}

function hideForm() {
  el("formSection").classList.add("hidden");
}

async function loadProdutos() {
  const tbody = el("produtosTbody");
  tbody.innerHTML = "<tr><td colspan='6'>Carregando...</td></tr>";

  try {
    const res = await fetch(API_BASE);
    if (!res.ok) throw new Error("Falha ao buscar produtos");
    const produtos = await res.json();

    if (produtos.length === 0) {
      tbody.innerHTML = "<tr><td colspan='6'>Nenhum produto cadastrado</td></tr>";
      return;
    }

    tbody.innerHTML = produtos.map(p => `
      <tr>
        <td>${p.imagemUrl ? `<img src="${p.imagemUrl}" class="thumb">` : "-"}</td>
        <td>${p.nome}</td>
        <td>${p.categoria || ""}</td>
        <td>R$ ${Number(p.preco).toFixed(2)}</td>
        <td>${p.estoque}</td>
        <td class="actions">
          <button onclick="editar(${p.id})">Editar</button>
          <button class="ghost" onclick="excluir(${p.id})">Excluir</button>
        </td>
      </tr>
    `).join("");

  } catch(e) {
    tbody.innerHTML = "<tr><td colspan='6' style='color:red'>Erro ao carregar produtos</td></tr>";
    console.error(e);
  }
}

async function editar(id) {
  try {
    const res = await fetch(`${API_BASE}/${id}`);
    if (!res.ok) throw new Error("Produto não encontrado");
    const prod = await res.json();
    showForm(prod);
    window.scrollTo({top:0,behavior:"smooth"});
  } catch(e) {
    alert(e.message);
  }
}

async function excluir(id) {
  if (!confirm("Confirma exclusão?")) return;

  try {
    const res = await fetch(`${API_BASE}/${id}`, {method: "DELETE"});
    if (res.status !== 204) throw new Error("Falha ao excluir produto");
    loadProdutos();
  } catch(e) {
    alert(e.message);
  }
}

el("produtoForm").addEventListener("submit", async e => {
  e.preventDefault();

  const id = el("produtoId").value;
  const payload = {
    nome: el("nome").value,
    categoria: el("categoria").value,
    descricao: el("descricao").value,
    preco: parseFloat(el("preco").value),
    estoque: parseInt(el("estoque").value),
    imagemUrl: el("imagemUrl").value
  };

  try {
    if (editando) {
      const res = await fetch(`${API_BASE}/${id}`, { 
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error("Erro ao editar produto");
    } else {
      const res = await fetch(API_BASE, { 
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error("Erro ao cadastrar produto");
    }

    alert("✅ Salvo com sucesso!");
    el("produtoForm").reset();
    hideForm();
    loadProdutos();

  } catch(e) {
    alert("Erro: " + e.message);
  }
});

loadProdutos();
</script>

</body>
</html>
